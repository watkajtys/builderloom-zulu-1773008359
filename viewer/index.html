<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>BuilderLoom Zulu - AI Factory Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style type="text/tailwindcss">
        :root {
            --zulu-primary: #0F071B; /* Midnight Plum */
            --zulu-surface: #1E1532; /* Deep Indigo */
            --zulu-accent: #A855F7; /* Electric Violet */
            --zulu-success: #2DD4BF; /* Neon Mint */
            --zulu-border: #3A2A5A;
            --zulu-text: #E9D8FD;
            --zulu-muted: #805AD5;
        }
        body {
            font-family: 'Geist', sans-serif;
            background-color: var(--zulu-primary);
            color: var(--zulu-text);
        }
        .matrix-text-glow {
            text-shadow: 0 0 5px rgba(168, 85, 247, 0.5), 0 0 10px rgba(168, 85, 247, 0.3);
        }
        .success-text-glow {
            text-shadow: 0 0 5px rgba(45, 212, 191, 0.5), 0 0 10px rgba(45, 212, 191, 0.3);
        }
        .matrix-border {
            border-color: var(--zulu-border);
        }
        .glass {
            background: rgba(30, 21, 50, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid var(--zulu-border);
        }
        .terminal-bg {
            background: #0B0514;
        }
        .scanline {
            background: linear-gradient(to bottom, transparent 50%, rgba(168, 85, 247, 0.03) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
        input::placeholder {
            color: var(--zulu-muted) !important;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--zulu-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--zulu-surface);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--zulu-border);
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#A855F7",
                        "success": "#2DD4BF",
                        "background-dark": "#0F071B",
                    },
                    fontFamily: {
                        "sans": ["Geist", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark text-[var(--zulu-text)] selection:bg-primary/30 relative">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function useQuery() {
            return new URLSearchParams(window.location.search);
        }

        function App() {
            const query = useQuery();
            const [currentView, setCurrentView] = useState(query.get("view") || "telemetry");
            const [state, setState] = useState(null);
            
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get("view") !== currentView) {
                    params.set("view", currentView);
                    window.history.pushState(null, "", `?${params.toString()}`);
                }
            }, [currentView]);

            const fetchState = async () => {
                try {
                    const res = await fetch(`/session_state.json?t=${new Date().getTime()}`);
                    if (!res.ok) throw new Error("State file not found");
                    const text = await res.text();
                    if (!text || text.trim() === "") return; 
                    const data = JSON.parse(text);
                    if (data) {
                        setState(data);
                    }
                } catch (e) {
                    console.warn("Fetch state error:", e.message);
                }
            };

            useEffect(() => {
                fetchState();
                const interval = setInterval(fetchState, 2000);
                return () => clearInterval(interval);
            }, []);

            const renderSidebarItem = (id, icon, label, group) => {
                const isActive = currentView === id;
                return (
                    <a 
                        className={`flex items-center gap-3 px-3 py-2 rounded-sm cursor-pointer transition-all border group ${isActive ? 'bg-primary/20 text-primary border-primary/40' : 'text-[var(--zulu-text)]/70 hover:bg-[var(--zulu-surface)] hover:text-primary border-transparent hover:border-[var(--zulu-border)]'}`}
                        onClick={(e) => { e.preventDefault(); setCurrentView(id); }}
                        href={`?view=${id}`}
                    >
                        <span className="material-symbols-outlined text-[20px]">{icon}</span>
                        <span className="text-sm font-medium">{label}</span>
                    </a>
                );
            };

            const liveLogs = state?.live_logs || [
                "[2023-10-27 14:12:01] INFO: Initializing Python 3.11 factory-runtime environment...",
                "[2023-10-27 14:12:03] INFO: Successfully pulled image 'zulu-worker-v2.1'",
                "[2023-10-27 14:12:05] DOCKER: Container 'zulu-core' started with ID a8f9c2d1e...",
                "[2023-10-27 14:12:06] INFO: Establishing GPU-accelerated bridge... [READY]",
                "[2023-10-27 14:12:08] WARN: Memory overhead exceeding 85% on node-04"
            ];

            const renderContent = () => {
                switch (currentView) {
                    case "telemetry":
                        return (
                            <div className="grid grid-cols-12 gap-6 h-full min-h-[600px]">
                                <div className="col-span-12 lg:col-span-8 flex flex-col bg-black rounded-sm overflow-hidden border border-[var(--zulu-border)] shadow-2xl">
                                    <div className="h-10 border-b border-[var(--zulu-border)] bg-[var(--zulu-primary)] flex items-center justify-between px-4">
                                        <div className="flex gap-2 items-center">
                                            <div className="flex gap-1.5 px-2">
                                                <div className="size-2 bg-[var(--zulu-muted)] rounded-full"></div>
                                                <div className="size-2 bg-[var(--zulu-muted)] rounded-full"></div>
                                                <div className="size-2 bg-primary rounded-full shadow-[0_0_5px_rgba(168,85,247,0.8)]"></div>
                                            </div>
                                            <div className="h-6 w-px bg-[var(--zulu-border)] mx-2"></div>
                                            <div className="flex items-center gap-4">
                                                <button className="text-[11px] font-bold text-primary uppercase tracking-wider border-b border-primary pb-1 mt-1">Std_Out</button>
                                                <button className="text-[11px] font-bold text-[var(--zulu-muted)] uppercase tracking-wider hover:text-primary transition-colors">Python</button>
                                                <button className="text-[11px] font-bold text-[var(--zulu-muted)] uppercase tracking-wider hover:text-primary transition-colors">Docker</button>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2 text-[var(--zulu-muted)]">
                                            <span className="material-symbols-outlined text-sm cursor-pointer hover:text-primary">search</span>
                                            <span className="material-symbols-outlined text-sm cursor-pointer hover:text-primary">terminal</span>
                                        </div>
                                    </div>
                                    <div className="flex-1 p-6 font-mono text-[13px] leading-relaxed overflow-y-auto terminal-bg text-[var(--zulu-text)]">
                                        {liveLogs.map((log, i) => (
                                            <div key={i} className="mb-1">
                                                <span className="text-[var(--zulu-muted)]">[{new Date().toLocaleTimeString()}]</span>{" "}
                                                <span className={`${log.includes('ERROR') ? 'text-red-400' : log.includes('WARN') ? 'text-yellow-400' : 'text-primary'} font-bold`}>{log.split(' ')[0]}</span>{" "}
                                                {log.substring(log.indexOf(' ') + 1)}
                                            </div>
                                        ))}
                                    </div>
                                    <div className="h-12 border-t border-[var(--zulu-border)] bg-[var(--zulu-primary)] flex items-center px-4 gap-3">
                                        <span className="material-symbols-outlined text-primary text-sm">chevron_right</span>
                                        <input className="bg-transparent border-none text-primary placeholder:text-[var(--zulu-muted)] text-sm focus:ring-0 w-full font-mono outline-none" placeholder="Execute factory instruction..." type="text"/>
                                    </div>
                                </div>
                                <div className="col-span-12 lg:col-span-4 space-y-6">
                                    <div className="glass rounded-sm p-6 relative overflow-hidden group border border-[var(--zulu-border)]">
                                        <div className="absolute -top-12 -right-12 size-32 bg-primary/10 blur-3xl"></div>
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <h3 className="text-sm font-bold text-[var(--zulu-muted)] uppercase tracking-widest">Sys_Status</h3>
                                                <p className="text-2xl font-bold mt-1 success-text-glow text-success">{state?.current_status || 'RUNNING'}</p>
                                            </div>
                                            <div className="size-10 rounded-sm bg-success/10 border border-[var(--zulu-border)] flex items-center justify-center">
                                                <span className="material-symbols-outlined text-success success-text-glow">verified_user</span>
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <div className="space-y-1.5">
                                                <div className="flex justify-between text-[10px] font-bold uppercase">
                                                    <span className="text-[var(--zulu-muted)]">CPU_Core_Load</span>
                                                    <span>42.8%</span>
                                                </div>
                                                <div className="h-1 bg-[var(--zulu-primary)] border border-[var(--zulu-border)] rounded-none overflow-hidden">
                                                    <div className="h-full bg-primary shadow-[0_0_5px_rgba(168,85,247,1)]" style={{width: '42.8%'}}></div>
                                                </div>
                                            </div>
                                            <div className="space-y-1.5">
                                                <div className="flex justify-between text-[10px] font-bold uppercase">
                                                    <span className="text-[var(--zulu-muted)]">Mem_Allocation</span>
                                                    <span>78.2%</span>
                                                </div>
                                                <div className="h-1 bg-[var(--zulu-primary)] border border-[var(--zulu-border)] rounded-none overflow-hidden">
                                                    <div className="h-full bg-primary/60" style={{width: '78.2%'}}></div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mt-6 pt-6 border-t border-[var(--zulu-border)]">
                                            <div className="flex items-center gap-4">
                                                <div className="flex-1">
                                                    <p className="text-[10px] text-[var(--zulu-muted)] font-bold uppercase mb-2">Active_Nodes</p>
                                                    <div className="flex gap-1">
                                                        <div className="size-6 bg-[var(--zulu-primary)] border border-primary/40 flex items-center justify-center text-[10px] font-bold text-primary">01</div>
                                                        <div className="size-6 bg-[var(--zulu-primary)] border border-primary/40 flex items-center justify-center text-[10px] font-bold text-primary">02</div>
                                                    </div>
                                                </div>
                                                <div className="flex-1 text-right">
                                                    <p className="text-[10px] text-[var(--zulu-muted)] font-bold uppercase mb-1">Latency_Ms</p>
                                                    <p className="text-sm font-bold text-primary matrix-text-glow">14.002</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-[var(--zulu-primary)] border border-[var(--zulu-border)] rounded-sm p-5">
                                        <h3 className="text-xs font-bold text-[var(--zulu-muted)] uppercase tracking-widest mb-4">Pipeline_Controls</h3>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button className="p-3 rounded-sm border border-[var(--zulu-border)] bg-[var(--zulu-surface)] hover:border-primary/50 transition-colors flex flex-col items-center gap-2 group">
                                                <span className="material-symbols-outlined text-[var(--zulu-muted)] group-hover:text-primary transition-colors">refresh</span>
                                                <span className="text-[10px] font-bold uppercase">Restart</span>
                                            </button>
                                            <button className="p-3 rounded-sm border border-[var(--zulu-border)] bg-[var(--zulu-surface)] hover:border-primary/50 transition-colors flex flex-col items-center gap-2 group">
                                                <span className="material-symbols-outlined text-[var(--zulu-muted)] group-hover:text-primary transition-colors">delete_sweep</span>
                                                <span className="text-[10px] font-bold uppercase">Clear</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    case "health":
                        return (
                            <div className="bg-[var(--zulu-surface)] border border-[var(--zulu-border)] rounded p-8">
                                <h2 className="text-2xl font-bold mb-4 matrix-text-glow">System Health Overview</h2>
                                <p className="text-[var(--zulu-muted)] mb-4">Detailed diagnostics and node statuses.</p>
                                <div className="grid grid-cols-3 gap-6">
                                    <div className="p-6 bg-[var(--zulu-primary)] border border-[var(--zulu-border)] rounded-sm">
                                        <h3 className="text-sm font-bold text-[var(--zulu-muted)] uppercase tracking-widest">Database</h3>
                                        <p className="text-xl mt-2 text-success font-mono">ONLINE</p>
                                    </div>
                                    <div className="p-6 bg-[var(--zulu-primary)] border border-[var(--zulu-border)] rounded-sm">
                                        <h3 className="text-sm font-bold text-[var(--zulu-muted)] uppercase tracking-widest">Workers</h3>
                                        <p className="text-xl mt-2 text-success font-mono">8 / 8</p>
                                    </div>
                                    <div className="p-6 bg-[var(--zulu-primary)] border border-[var(--zulu-border)] rounded-sm">
                                        <h3 className="text-sm font-bold text-[var(--zulu-muted)] uppercase tracking-widest">Queue</h3>
                                        <p className="text-xl mt-2 text-primary font-mono">0 pending</p>
                                    </div>
                                </div>
                            </div>
                        );
                    case "kanban":
                        return (
                            <div className="bg-[var(--zulu-surface)] border border-[var(--zulu-border)] rounded p-8">
                                <h2 className="text-2xl font-bold mb-4 matrix-text-glow">Sprint Backlog (Kanban)</h2>
                                <p className="text-[var(--zulu-muted)] mb-4">Active and pending tasks.</p>
                                <div className="flex gap-4 min-h-[400px]">
                                    <div className="flex-1 bg-[var(--zulu-primary)] border border-[var(--zulu-border)] rounded p-4">
                                        <h3 className="font-bold text-xs uppercase text-[var(--zulu-muted)] mb-4">To Do</h3>
                                    </div>
                                    <div className="flex-1 bg-[var(--zulu-primary)] border border-[var(--zulu-border)] rounded p-4">
                                        <h3 className="font-bold text-xs uppercase text-[var(--zulu-muted)] mb-4">In Progress</h3>
                                        <div className="bg-[var(--zulu-surface)] p-3 border border-primary/50 rounded mb-2">
                                            <p className="text-sm">Implement Telemetry Dash</p>
                                        </div>
                                    </div>
                                    <div className="flex-1 bg-[var(--zulu-primary)] border border-[var(--zulu-border)] rounded p-4">
                                        <h3 className="font-bold text-xs uppercase text-[var(--zulu-muted)] mb-4">Done</h3>
                                    </div>
                                </div>
                            </div>
                        );
                    case "roadmap":
                        return (
                            <div className="bg-[var(--zulu-surface)] border border-[var(--zulu-border)] rounded p-8">
                                <h2 className="text-2xl font-bold mb-4 matrix-text-glow">Strategic Roadmap</h2>
                                <p className="text-[var(--zulu-muted)] mb-4">Future milestones and factory goals.</p>
                                <div className="space-y-4">
                                    <div className="p-4 border-l-2 border-success bg-[var(--zulu-primary)]">
                                        <h4 className="font-bold">Phase 1: Foundation</h4>
                                        <p className="text-sm text-[var(--zulu-muted)]">Core pipelines and observer dashboard.</p>
                                    </div>
                                    <div className="p-4 border-l-2 border-primary bg-[var(--zulu-primary)]">
                                        <h4 className="font-bold">Phase 2: Scale</h4>
                                        <p className="text-sm text-[var(--zulu-muted)]">Multi-node cluster execution.</p>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return <div className="text-[var(--zulu-text)] p-8">Select a view from the sidebar.</div>;
                }
            };

            const viewTitles = {
                telemetry: "Telemetry Console",
                health: "System Health",
                kanban: "Sprint Backlog",
                roadmap: "Strategic Roadmap"
            };

            const viewSubtitles = {
                telemetry: "Accessing real-time execution pipelines...",
                health: "Node diagnostics and cluster metrics...",
                kanban: "Active sprint execution tracking...",
                roadmap: "Future milestones and strategic planning..."
            };

            return (
                <div className="flex h-screen overflow-hidden relative z-10">
                    <div className="fixed inset-0 scanline z-50 pointer-events-none"></div>
                    <aside className="w-64 border-r border-[var(--zulu-border)] flex flex-col bg-[var(--zulu-primary)]">
                        <div className="p-6 flex items-center gap-3">
                            <div className="size-8 bg-primary rounded-sm flex items-center justify-center text-white shadow-lg shadow-primary/20">
                                <span className="material-symbols-outlined text-xl">deployed_code</span>
                            </div>
                            <div>
                                <h1 className="font-bold text-sm tracking-tight matrix-text-glow">BuilderLoom Zulu</h1>
                                <p className="text-[10px] text-[var(--zulu-muted)] uppercase tracking-widest font-bold">AI Factory</p>
                            </div>
                        </div>
                        <nav className="flex-1 px-4 space-y-1">
                            <div className="text-[10px] font-bold text-[var(--zulu-muted)] uppercase px-3 py-4 tracking-wider">Engineering</div>
                            {renderSidebarItem("telemetry", "analytics", "Telemetry", "engineering")}
                            {renderSidebarItem("health", "monitor_heart", "System Health", "engineering")}
                            {renderSidebarItem("kanban", "view_kanban", "Kanban", "engineering")}
                            {renderSidebarItem("roadmap", "map", "Roadmap", "engineering")}
                            
                            <div className="text-[10px] font-bold text-[var(--zulu-muted)] uppercase px-3 py-4 tracking-wider">Infrastructure</div>
                            {renderSidebarItem("datasets", "database", "Datasets", "infrastructure")}
                            {renderSidebarItem("modelzoo", "layers", "Model Zoo", "infrastructure")}
                        </nav>
                        <div className="p-4 border-t border-[var(--zulu-border)]">
                            <div className="flex items-center gap-3 p-2 rounded-sm bg-[var(--zulu-surface)] border border-[var(--zulu-border)]">
                                <div className="size-8 rounded-sm bg-primary/10 flex items-center justify-center border border-primary/30">
                                    <span className="material-symbols-outlined text-primary text-sm">bolt</span>
                                </div>
                                <div className="flex-1 min-w-0">
                                    <p className="text-xs font-bold truncate">V3 Optimizer Active</p>
                                    <p className="text-[10px] text-[var(--zulu-muted)]">Efficiency: 88.4%</p>
                                </div>
                            </div>
                        </div>
                    </aside>
                    <main className="flex-1 flex flex-col min-w-0 overflow-hidden bg-[var(--zulu-surface)]">
                        <header className="h-16 border-b border-[var(--zulu-border)] flex items-center justify-between px-8 bg-[var(--zulu-primary)]">
                            <div className="flex items-center gap-4">
                                <nav className="flex items-center text-sm font-medium text-[var(--zulu-muted)]">
                                    <span className="hover:text-primary cursor-pointer">Projects</span>
                                    <span className="material-symbols-outlined text-sm mx-2">chevron_right</span>
                                    <span className="text-[var(--zulu-text)] font-bold matrix-text-glow underline underline-offset-4">Zulu-Core-Main</span>
                                </nav>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="relative group">
                                    <span className="material-symbols-outlined text-[var(--zulu-text)]/60 hover:text-primary cursor-pointer transition-colors">notifications</span>
                                    <span className="absolute top-0 right-0 size-2 bg-primary rounded-full border-2 border-[var(--zulu-primary)]"></span>
                                </div>
                                <div className="h-8 w-px bg-[var(--zulu-border)]"></div>
                                <div className="flex items-center gap-3">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-xs font-bold leading-none">Alex Rivera</p>
                                        <p className="text-[10px] text-[var(--zulu-muted)] font-bold uppercase">Arch_Node_01</p>
                                    </div>
                                    <div className="size-9 rounded-sm bg-[var(--zulu-surface)] overflow-hidden ring-1 ring-[var(--zulu-border)]">
                                        <div className="w-full h-full bg-primary/20 flex items-center justify-center">
                                            <span className="material-symbols-outlined text-[var(--zulu-text)]">person</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-8 relative">
                            <div className="flex justify-between items-end mb-8">
                                <div>
                                    <h2 className="text-3xl font-bold tracking-tight text-[var(--zulu-text)] matrix-text-glow">{viewTitles[currentView] || "Dashboard"}</h2>
                                    <p className="text-[var(--zulu-muted)] mt-1 font-medium">{viewSubtitles[currentView] || "Managing factory state..."}</p>
                                </div>
                                <div className="flex gap-2">
                                    <button className="bg-[var(--zulu-primary)] border border-[var(--zulu-border)] px-4 py-2 rounded-sm text-sm font-bold flex items-center gap-2 hover:bg-[var(--zulu-surface)] transition-colors">
                                        <span className="material-symbols-outlined text-sm">download</span> Export_Raw
                                    </button>
                                    <button className="bg-primary text-white px-4 py-2 rounded-sm text-sm font-bold flex items-center gap-2 shadow-lg shadow-primary/40 transition-all hover:brightness-110 active:scale-95">
                                        <span className="material-symbols-outlined text-sm">play_arrow</span> Resume_Proc
                                    </button>
                                </div>
                            </div>
                            {renderContent()}
                        </div>
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
